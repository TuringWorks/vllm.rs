name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Validate that all package versions match the tag
  # ---------------------------------------------------------------------------
  validate:
    name: validate-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        id: version
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_version="$(node -p "require('./npm/package.json').version")"
          if [ "$cargo_version" != "$npm_version" ]; then
            echo "Cargo.toml version ($cargo_version) must match npm/package.json version ($npm_version)" >&2
            exit 1
          fi
          expected_tag="v${cargo_version}"
          if [ "${{ github.ref_name }}" != "$expected_tag" ]; then
            echo "Tag ${{ github.ref_name }} must match package version $expected_tag" >&2
            exit 1
          fi
          echo "version=${cargo_version}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # CUDA legacy builds: SM70/SM75 on GitHub-hosted runners (CUDA 12.9 image)
  # These older archs don't need flashinfer/cutlass and work on free runners.
  # ---------------------------------------------------------------------------
  cuda-legacy:
    name: cuda-${{ matrix.sm_name }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - sm: "70"
            sm_name: sm70
            cuda_version: "12.9.0"
            features: "cuda,nccl"
            python_features: "cuda,nccl,python"
          - sm: "75"
            sm_name: sm75
            cuda_version: "12.9.0"
            features: "cuda,nccl"
            python_features: "cuda,nccl,python"
    container:
      image: docker.io/nvidia/cuda:${{ matrix.cuda_version }}-cudnn-devel-ubuntu22.04
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.sm }}
      DEBIAN_FRONTEND: noninteractive
      RAYON_NUM_THREADS: "16"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends --allow-change-held-packages \
            libnccl-dev libnccl2 \
            curl git ca-certificates \
            libssl-dev pkg-config \
            clang libclang-dev \
            python3-pip patchelf dpkg-dev
          rm -rf /var/lib/apt/lists/*

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin and cargo-deb
        run: |
          . "$HOME/.cargo/env"
          pip3 install --no-cache-dir maturin patchelf cffi
          cargo install cargo-deb

      - name: Build xinfer binary
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --bin xinfer --features "${{ matrix.features }}"

      - name: Build Python wheel
        run: |
          . "$HOME/.cargo/env"
          ./build.sh --release --features "${{ matrix.python_features }}"

      - name: Package deb
        run: |
          . "$HOME/.cargo/env"
          cargo deb --no-build --output "dist/xinfer-linux-x64-${{ matrix.sm_name }}.deb"

      - name: Package tar.gz
        run: |
          mkdir -p dist/xinfer
          cp target/release/xinfer dist/xinfer/xinfer
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-linux-x64-${{ matrix.sm_name }}.tar.gz" xinfer
          rm -rf dist/xinfer

      - name: Collect and tag wheel with SM variant
        run: |
          mkdir -p dist/wheels
          for whl in target/wheels/*.whl; do
            base="$(basename "$whl")"
            tagged="$(echo "$base" | sed "s/-cp/-${{ matrix.sm }}-cp/")"
            cp "$whl" "dist/wheels/$tagged"
          done
          ls -la dist/wheels/

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-cuda-${{ matrix.sm_name }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl

  # ---------------------------------------------------------------------------
  # CUDA builds: SM80+ on self-hosted runner (CUDA 13.0 already installed)
  # Builds run sequentially (max-parallel: 1) switching CUDA_COMPUTE_CAP.
  # ---------------------------------------------------------------------------
  cuda:
    name: cuda-${{ matrix.sm_name }}
    runs-on: self-hosted
    needs: validate
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - sm: "80"
            sm_name: sm80
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "89"
            sm_name: sm89
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "90"
            sm_name: sm90
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
          - sm: "120"
            sm_name: sm120
            features: "cuda,nccl,flashinfer,cutlass"
            python_features: "cuda,nccl,flashinfer,cutlass,python"
    env:
      CUDA_COMPUTE_CAP: ${{ matrix.sm }}
      RAYON_NUM_THREADS: "128"
    steps:
      - uses: actions/checkout@v4

      - name: Clean previous build artifacts
        run: cargo clean 2>/dev/null || true

      - name: Build xinfer binary
        run: cargo build --release --bin xinfer --features "${{ matrix.features }}"

      - name: Build Python wheel
        run: ./build.sh --release --features "${{ matrix.python_features }}"

      - name: Package deb
        run: cargo deb --no-build --output "dist/xinfer-linux-x64-${{ matrix.sm_name }}.deb"

      - name: Package tar.gz
        run: |
          mkdir -p dist/xinfer
          cp target/release/xinfer dist/xinfer/xinfer
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-linux-x64-${{ matrix.sm_name }}.tar.gz" xinfer
          rm -rf dist/xinfer

      - name: Collect and tag wheel with SM variant
        run: |
          mkdir -p dist/wheels
          for whl in target/wheels/*.whl; do
            base="$(basename "$whl")"
            tagged="$(echo "$base" | sed "s/-cp/-${{ matrix.sm }}-cp/")"
            cp "$whl" "dist/wheels/$tagged"
          done
          ls -la dist/wheels/

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-cuda-${{ matrix.sm_name }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl

  # ---------------------------------------------------------------------------
  # Metal build (macOS) — GitHub-hosted runner
  # ---------------------------------------------------------------------------
  metal:
    name: metal-${{ matrix.npm_target }}
    runs-on: macos-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            npm_target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build xinfer binary
        run: cargo build --release --target ${{ matrix.rust_target }} --bin xinfer --features "metal"

      - name: Package tar.gz
        run: |
          mkdir -p "dist/xinfer"
          cp "target/${{ matrix.rust_target }}/release/xinfer" "dist/xinfer/xinfer"
          tar -C dist/xinfer -czf "dist/xinfer-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}-metal.tar.gz" xinfer
          rm -rf dist/xinfer

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-${{ matrix.npm_target }}-metal
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Checksums + GitHub Release
  # ---------------------------------------------------------------------------
  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: [validate, cuda-legacy, cuda, metal]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.whl" \) \
            -exec sha256sum {} + > SHA256SUMS
          cat SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: xinfer-release-artifacts
          path: dist/*

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xInfer v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/wheels/*.whl
            dist/SHA256SUMS

  # ---------------------------------------------------------------------------
  # Publish wheel index to GitHub Pages (PEP 503 simple repository)
  # Users install with: pip install xinfer --index-url https://guoqingbao.github.io/xinfer/
  # (URL resolves correctly after repo is renamed from vllm.rs to xinfer)
  # ---------------------------------------------------------------------------
  publish-index:
    name: publish-index
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build PEP 503 index
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p site/xinfer
          RELEASE_BASE="https://github.com/${REPO}/releases/download/${TAG}"

          {
            echo '<!DOCTYPE html><html><body>'
            for whl in dist/wheels/*.whl; do
              [ -f "$whl" ] || continue
              name="$(basename "$whl")"
              sha="$(sha256sum "$whl" | cut -d' ' -f1)"
              echo "<a href=\"${RELEASE_BASE}/${name}#sha256=${sha}\">${name}</a><br/>"
            done
            echo '</body></html>'
          } > site/xinfer/index.html

          echo '<!DOCTYPE html><html><body><a href="xinfer/">xinfer</a></body></html>' > site/index.html
          echo "Generated index:"
          cat site/xinfer/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deploy

  # ---------------------------------------------------------------------------
  # Publish npm package
  # ---------------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    environment: xInfer
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip when NPM_TOKEN is not configured
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."
      - uses: actions/checkout@v4
        if: env.NODE_AUTH_TOKEN != ''
      - uses: actions/setup-node@v4
        if: env.NODE_AUTH_TOKEN != ''
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish ./npm --access public --provenance
